[rewrite_local]
# Block web play requests
^https?:\/\/[\w-]*\.douyin\.com\/aweme\/v1\/web\/play\/ url reject-200
^https?:\/\/aweme\.amemv\.com\/aweme\/v1\/web\/play\/ url reject-200

# Block short drama & ad requests
^https?:\/\/.*\.douyin\.com\/.*(shortplay|short_play|drama) url reject
^https?:\/\/.*\.bytedance\.com\/.*(shortplay|drama) url reject
^https?:\/\/.*\.pstatp\.com\/.*(shortplay|drama) url reject
^https?:\/\/.*\.ixigua\.com\/.*(shortplay|drama) url reject

# Block short drama entry API
^https?:\/\/.*\.douyin\.com\/api\/.*\/shortplay\/entrance url reject
^https?:\/\/.*\.douyin\.com\/api\/.*\/drama\/entrance url reject

[mitm]
hostname = *.douyin.com, aweme.amemv.com, *.bytedance.com, *.pstatp.com, *.ixigua.com
