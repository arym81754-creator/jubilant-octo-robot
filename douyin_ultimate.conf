[rewrite_local]
# Block web play requests
^https?:\/\/[\w-]*\.douyin\.com\/aweme\/v1\/web\/play\/ url reject-200
^https?:\/\/aweme\.amemv\.com\/aweme\/v1\/web\/play\/ url reject-200

# Block short drama core APIs
^https?:\/\/.*\.douyin\.com\/api\/.*shortplay url reject
^https?:\/\/.*\.douyin\.com\/api\/.*drama url reject
^https?:\/\/.*\.bytedance\.com\/.*shortplay url reject
^https?:\/\/.*\.pstatp\.com\/.*shortplay url reject

# Block ad requests
^https?:\/\/.*\.douyin\.com\/api\/ad\/ url reject
^https?:\/\/.*\.douyin\.com\/api\/feed\/ad url reject
^https?:\/\/.*\.douyin\.com\/api\/.*\/feed\/stream\/ url reject
^https?:\/\/p3-ad-sign\.byteimg\.com\/.* url reject
^https?:\/\/rta2\.wesure100\.com\/.* url reject
^https?:\/\/ads5.*\.zijieapi\.com\/.* url reject

# Block log/tracking requests
^https?:\/\/log.*\.amemv\.com\/.* url reject
^https?:\/\/mon.*\.amemv\.com\/.* url reject
^https?:\/\/analytics.*\.byteintl\.com\/.* url reject
^https?:\/\/.*\.byteapm\.com\/.* url reject
^https?:\/\/.*\.pstatp\.com\/log\/.* url reject

# Block third-party ad domains
^https?:\/\/.*\.doubleclick\.net\/.* url reject
^https?:\/\/.*\.googleads\.g\.doubleclick\.net\/.* url reject
^https?:\/\/.*\.facebook\.com\/.*\/ads\/.* url reject
^https?:\/\/.*\.appsflyer\.com\/.* url reject
^https?:\/\/.*\.adjust\.com\/.* url reject
^https?:\/\/dig\.bdurl\.net\/.* url reject
^https?:\/\/vevrl9air2\.cloudflare-gateway\.com\/.* url reject

[mitm]
hostname = *.douyin.com,aweme.amemv.com,*.bytedance.com,*.pstatp.com,*.ixigua.com,p3-ad-sign.byteimg.com,rta2.wesure100.com,*.zijieapi.com,*.byteintl.com,*.byteapm.com,*.doubleclick.net,*.googleads.g.doubleclick.net,*.facebook.com,*.appsflyer.com,*.adjust.com,bdurl.net,cloudflare-gateway.com
