[rewrite_local]
# Block web play requests
^https?:\/\/[\w-]*\.douyin\.com\/aweme\/v1\/web\/play\/ url reject-200
^https?:\/\/aweme\.amemv\.com\/aweme\/v1\/web\/play\/ url reject-200

# Block short drama core APIs
^https?:\/\/.*\.douyin\.com\/api\/v\d+\/shortplay\/ url reject
^https?:\/\/.*\.douyin\.com\/api\/.*\/shortplay\/list url reject
^https?:\/\/.*\.douyin\.com\/api\/.*\/shortplay\/detail url reject
^https?:\/\/.*\.douyin\.com\/api\/.*\/drama\/ url reject
^https?:\/\/.*\.bytedance\.com\/.*\/shortplay\/ url reject
^https?:\/\/.*\.pstatp\.com\/.*\/shortplay\/ url reject

# Block ad requests
^https?:\/\/.*\.douyin\.com\/api\/ad\/ url reject
^https?:\/\/.*\.douyin\.com\/api\/feed\/ad url reject
^https?:\/\/.*\.douyin\.com\/api\/v\d+\/feed\/stream\/ url reject
^https?:\/\/p3-ad-sign\.byteimg\.com:443\/.* url reject
^https?:\/\/rta2\.wesure100\.com\/.* url reject

# Block log/tracking requests
^https?:\/\/logbk\.amemv\.com\/.* url reject
^https?:\/\/log5-misc-lf\.amemv\.com\/.* url reject
^https?:\/\/analytics\.byteintl\.com\/.* url reject
^https?:\/\/data\.byteintl\.com\/.* url reject
^https?:\/\/log\.byteapm\.com\/.* url reject
^https?:\/\/metrics\.byteintl\.com\/.* url reject
^https?:\/\/log\.pstatp\.com\/.* url reject

# Block third-party ad domains
^https?:\/\/.*\.doubleclick\.net\/.* url reject
^https?:\/\/.*\.googleads\.g\.doubleclick\.net\/.* url reject
^https?:\/\/.*\.facebook\.com\/.*\/ads\/.* url reject
^https?:\/\/.*\.appsflyer\.com\/.* url reject
^https?:\/\/.*\.adjust\.com\/.* url reject

# Modify feed response to remove drama and ads
^https?:\/\/.*\.douyin\.com\/api\/aweme\/v\d+\/feed url response-body {"item_list":(.*),"shortplay_info":.*} replace {"item_list":$1}
^https?:\/\/.*\.douyin\.com\/api\/aweme\/v\d+\/feed url response-body "is_ad":true.*?}, replace },
^https?:\/\/.*\.douyin\.com\/api\/aweme\/v\d+\/feed url response-body "desc":".*?(shortplay|drama).*?", replace "desc":""

[mitm]
hostname = *.douyin.com,aweme.amemv.com,*.bytedance.com,*.pstatp.com,*.ixigua.com,p3-ad-sign.byteimg.com,rta2.wesure100.com,logbk.amemv.com,log5-misc-lf.amemv.com,analytics.byteintl.com,data.byteintl.com,log.byteapm.com,metrics.byteintl.com,log.pstatp.com
